#
# Draco 6085 emulator config — XDE 5.0 with 2x Tajo volumes + hacks
#
# Per disks-6085/readme.md, this disk is the most stable of the three
# Draco disks. It's the safest choice for a first boot test. Shutdown
# options that work:
#   - "Boot button" from the HeraldWindow context menu (system restarts)
#   - "Quit" from the "Exec Ops" desktop background menu (== Boot button)
#   - The "Stop" button of the Dwarf/Draco emulator UI (always works)
#
# Run from the repo root with:
#   dotnet run --project csharp/Dwarf.Cli --configuration Release -- -draco -gui disks-6085/xde5.0_2xTajo+hacks.properties
#

# The 6085 disk image (.zdisk format, read-only path — see DECISIONS.md §8)
# Path is relative to the current working directory when launching dotnet.
boot = disks-6085/xde5.0_2xTajo+hacks.zdisk

# Display: large 1152x861 19" screen (Daybreak's premium display).
# Set to false for the small 832x633 15" screen.
largeScreen = true

# Pilot boot switches. Default value matches the Java Draco upstream.
# Backslash-N octal sequences are passed verbatim to the germ; do not
# escape the backslashes in this .properties (the C# port's PropertiesExt
# does not process backslash-Unicode escapes).
switches = 8Wy{|}\346\347\350\377

# Machine ID (processorId / MAC). This disk's "Software Options" are
# NOT bound to a specific MAC (unlike vp2.0.5.zdisk), so the default is
# fine. Change this only if you need network-distinct emulators.
processorId = 00-1D-AB-EA-F4-C4

# Disk label policy — match the Java sample config defaults.
# verify     = check labels strictly; fail on mismatch
# updateDisk = if mismatch, update the on-disk label (in-memory only in C#)
# noVerify   = skip label checks entirely
labelOpOnRead = updateDisk
labelOpOnWrite = updateDisk
labelOpOnVerify = verify
logLabelProblems = false

# Network: leave empty for the internal time service fallback. To connect
# to a Dodo NetHub, set host and port.
netHubHost =
netHubPort = 3333
localTimeOffsetMinutes = 0

# Window title shown in Avalonia. Defaults to the disk filename if unset.
title = XDE 5.0 (Tajo + hacks)

# Auto-start engine on launch (vs. waiting for a UI start button).
# The C# port currently always autostarts; left here for forward compat.
autostart = true
