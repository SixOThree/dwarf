#
# Draco 6085 emulator config — ViewPoint 2.0.5
#
# ViewPoint 2.0 environment built on top of XDE 5.0. Includes BWS, VP Editor,
# VP Netcomm, Essentials Applications, Office Accessories, Document editor
# extensions, Spreadsheet, File Converters, and Help documents.
#
# IMPORTANT — Software-Options MAC binding:
# This disk's "Software Options" are bound to processor id 10-00-FE-31-AB-21.
# Do NOT change `processorId` below unless you're prepared to redo the
# Software Options activation (see Darkstar readme §3.3.3 for the procedure):
#   https://github.com/livingcomputermuseum/Darkstar#333-installing-an-operating-system
#
# Shutdown safely: ViewPoint 2.0 does not have a clean halt option that works
# with Draco. The procedure is:
#   1. Logoff (retain, delete, or transfer the desktop to a file server)
#   2. Wait until the screen turns black with the bouncing keyboard icon
#   3. Close the Avalonia window (== Stop button on the Java UI)
# This saves any disk changes to the in-memory shadow (which is then
# discarded on shutdown in the C# port — see csharp/MIGRATION.md).
#
# Run from the repo root with:
#   dotnet run --project csharp/Dwarf.Cli --configuration Release -- -draco -gui disks-6085/vp2.0.5.properties
#

boot = disks-6085/vp2.0.5.zdisk

# Large 19" screen (1152x861) — ViewPoint really benefits from screen real estate
largeScreen = true

# Pilot boot switches (default)
switches = 8Wy{|}\346\347\350\377

# Software-Options MAC binding — DO NOT change without re-activating the
# Software Options on the disk (see the procedure linked above).
processorId = 10-00-FE-31-AB-21

# Disk label policy — match the safer Tajo+hacks defaults
labelOpOnRead = updateDisk
labelOpOnWrite = updateDisk
labelOpOnVerify = verify
logLabelProblems = false

# Network: internal time service fallback. ViewPoint can interact with
# XNS file/auth/mail services if a Dodo NetHub is reachable; set host/port
# below to enable.
netHubHost =
netHubPort = 3333
localTimeOffsetMinutes = 0

title = ViewPoint 2.0.5
autostart = true
