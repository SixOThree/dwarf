#
# Draco 6085 emulator config — XDE 5.0 (original Xerox disk from Bitsavers)
#
# Per disks-6085/readme.md, this is the original XDE 5.0 disk regenerated
# from the Bitsavers Micropolis 1325 archive. It's the most-faithful
# reference disk for Draco's rigid-disk emulation, but Pilot 12.3 on a
# real 6085 disk is finicky:
#   - booting from CoPilot works
#   - working with XDE (list/create/edit/delete files, network services) works
#   - world-swapping fails with varying MP codes (mostly 0921)
#   - XDE shutdown menus leave the disk corrupted (MP 0915 on next reboot)
#
# Shutdown safely: **ONLY use the "Stop" button on the Dwarf/Draco UI**
# (close the Avalonia window). Do NOT use XDE menu items
# ("Boot button", "Quit", "Power off") on this disk.
#
# If the disk does get into a bad state, restore from a working archived
# delta — see disks-6085/readme.md for the recovery procedure.
#
# Run from the repo root with:
#   dotnet run --project csharp/Dwarf.Cli --configuration Release -- -draco -gui disks-6085/xde5.0.properties
#

boot = disks-6085/xde5.0.zdisk

# Large 19" screen (1152x861)
largeScreen = true

# Pilot boot switches (default)
switches = 8Wy{|}\346\347\350\377

# Default 6085 MAC — not bound to a specific MAC like vp2.0.5
processorId = 00-1D-AB-EA-F4-C4

# Disk label policy. Keep `verify` here (not updateDisk) since the disk
# is intended as a reference: writing back labels that diverge from the
# original Pilot expectations would erode the fidelity gate.
labelOpOnRead = verify
labelOpOnWrite = verify
labelOpOnVerify = verify
logLabelProblems = false

# Network: internal time service fallback
netHubHost =
netHubPort = 3333
localTimeOffsetMinutes = 0

title = XDE 5.0 (original Bitsavers disk)
autostart = true
